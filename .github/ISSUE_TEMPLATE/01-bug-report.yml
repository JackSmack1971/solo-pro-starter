name: "Bug Report"
description: "Report a confirmed defect in the scaffold — a skill, rule, agent, command, hook, or CI workflow that behaves incorrectly."
title: "bug: "
labels: ["bug", "triage"]
assignees: ["JackSmack1971"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the [Troubleshooting Matrix](https://github.com/JackSmack1971/solo-pro-starter#troubleshooting-matrix) and search [existing issues](https://github.com/JackSmack1971/solo-pro-starter/issues).

  - type: dropdown
    id: affected-component
    attributes:
      label: Affected Component
      description: Which part of the scaffold is misbehaving?
      options:
        - "Skill (`.claude/skills/`)"
        - "Rule (`.claude/rules/`)"
        - "Agent (`.claude/agents/`)"
        - "Slash command (`.claude/commands/`)"
        - "Hook / settings.json"
        - "CI workflow (`.github/workflows/ci.yml`)"
        - "README / documentation"
        - "Other"
    validations:
      required: true

  - type: input
    id: component-name
    attributes:
      label: Component Name or File Path
      description: "e.g., `.claude/skills/evm-dapp/SKILL.md` or `/fsv-verify`"
      placeholder: ".claude/skills/..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens? Include any error output.
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open Claude Code in a repo with this scaffold
        2. Invoke `/evm-dapp scaffold`
        3. Observe error: ...
    validations:
      required: true

  - type: input
    id: claude-version
    attributes:
      label: Claude Code CLI Version
      placeholder: "e.g., 1.3.2 — run `claude --version`"
    validations:
      required: true

  - type: input
    id: scaffold-version
    attributes:
      label: Scaffold Version / Commit
      placeholder: "e.g., v1.0.0 or commit SHA"
    validations:
      required: false

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have checked the Troubleshooting Matrix and it does not cover this issue.
          required: true
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: This is a bug in the scaffold, not in Claude Code, viem, ethers, or Foundry.
          required: true
